<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Імперія Грифона</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <!-- Головне меню -->
    <div id="mainMenu">
        <h1>🦅 Імперія Грифона</h1>
        <button onclick="showLogin()">Увійти</button>
        <button onclick="showRegister()">Реєстрація</button>
    </div>

    <!-- Вікно авторизації -->
    <div id="auth" style="display:none;"></div> 

    <!-- Основна гра -->
    <div id="game" style="display:none;">
        <!-- Панель ресурсів -->
        <div id="topbar">
            <span>💰 <span id="gold">0</span></span>
            <span>💎 <span id="diamonds">0</span></span>
            <span>⚔️ <span id="power">0</span></span>
            <span>⭐ <span id="level">1</span></span>
        </div>

        <!-- Смужка досвіду -->
        <div id="expBar">
            <div id="expFill">0%</div>
        </div>

        <!-- Лог останнього бою -->
        <div id="battleLog" style="height:40px; color:#ffdf5d; text-align:center; font-style:italic; margin: 10px 0;"></div>

        <!-- Основне меню (Навігація) -->
        <div id="menu" style="text-align: center;">
            <button onclick="show('hero')">🛡️ Герой</button>
            <button onclick="show('castle')">🏰 Замок</button>
            <button onclick="show('war')">⚔️ Війна</button>
            <button onclick="show('train')">🏋️ Тренування</button>
            <button onclick="show('inventory')">🎒 Сумка</button>
            <button onclick="show('army')">🏹 Армія</button>
            <button onclick="show('raid')">⚔️ Рейд</button>
            <button onclick="show('friends')">🤝 Друзі</button>
        </div>

        <!-- Сюди завантажується контент вибраної вкладки -->
        <div id="content"></div>

        <!-- Нижнє сервісне меню -->
        <div id="bottomMenu">
            <button onclick="show('rating')">🏆 Рейтинг</button>
            <button onclick="show('shop')">💎 Магазин</button>
            <button onclick="show('chat')">💬 Чат</button>
            <button id="mailBtn" onclick="show('mail')">📩 Пошта</button>
            <button onclick="show('settings')">⚙️ Налаштування</button>
            <button onclick="logout()">🚪 Вийти</button>
        </div>
    </div>
</div>

<!-- Підключення скриптів (залиш як було) -->
...
</body>
</html>
