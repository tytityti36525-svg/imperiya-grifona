<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦅 Імперія Грифона</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <!-- Головне меню авторизації -->
    <div id="mainMenu">
        <h1>🦅 Імперія Грифона</h1>
        <button onclick="showLogin()">Увійти</button>
        <button onclick="showRegister()">Реєстрація</button>
    </div>

    <div id="auth" style="display:none;"></div> 

    <!-- Основний інтерфейс гри -->
    <div id="game" style="display:none;">
        
        <!-- Панель ресурсів -->
        <div id="topbar">
            <div class="res">💰 <span id="gold">0</span></div>
            <div class="res">💎 <span id="diamonds">0</span></div>
            <div class="res">⚔️ <span id="power">0</span></div>
            <div class="res">⭐ <span id="level">1</span></div>
        </div>

        <!-- Прогрес та статуси -->
        <div id="status-container">
            <div id="expBar"><div id="expFill">0%</div></div>
            <div id="exp-status-bar">🧭 Загін відпочиває</div>
            <div id="potion-status-bar"></div>
        </div>

        <!-- Ігрове логування -->
        <div id="battleLog"></div>

        <!-- Оновлена навігація по категоріях -->
        <nav class="game-nav">
            <div class="nav-group">
                <small>ВІЙСЬКО</small>
                <div class="buttons">
                    <button onclick="show('war')">⚔️ Війна</button>
                    <button onclick="show('raid')">👹 Рейд</button>
                    <button onclick="show('army')">🏹 Армія</button>
                </div>
            </div>
            <div class="nav-group">
                <small>ГЕРОЙ ТА РОЗВИТОК</small>
                <div class="buttons">
                    <button onclick="show('hero')">👤 Герой</button>
                    <button onclick="show('altar')">⛩️ Вівтар</button>
                    <button onclick="show('train')">🏋️ Зал</button>
                    <button onclick="show('castle')">🏰 Замок</button>
                </div>
            </div>
            <div class="nav-group">
                <small>СВІТ ТА МЕНЕДЖМЕНТ</small>
                <div class="buttons">
                    <button onclick="show('inventory')">🎒 Сумка</button>
                    <button onclick="show('expeditions')">🧭 Походи</button>
                    <button onclick="show('shop')">💎 Крамниця</button>
                    <button onclick="show('friends')">🤝 Друзі</button>
                    <button onclick="show('chat')">💬 Чат</button>
                    <button id="mailBtn" onclick="show('mail')">📩 Пошта</button>
                </div>
            </div>
        </nav>

        <!-- Область відображення контенту вкладки -->
        <div id="content"></div>

        <!-- Нижнє сервісне меню -->
        <div id="footer-menu">
            <button onclick="show('rating')">🏆 Топ</button>
            <button onclick="show('settings')">⚙️</button>
            <button onclick="logout()" class="btn-exit">🚪 Вийти</button>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<!-- Скрипти гри -->
<script src="init.js"></script> 
<script src="game.js"></script> 
<script src="auth.js"></script>

</body>
</html>
